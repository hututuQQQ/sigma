name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  NODE_VERSION: 26.4.0
  PNPM_VERSION: 11.7.0
  RUST_VERSION: 1.96.0
  RUST_COVERAGE_TOOLCHAIN: nightly-2026-07-01
  CARGO_LLVM_COV_VERSION: 0.8.6

jobs:
  evaluation-conformance:
    name: Evaluation V2 conformance (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            label: linux-x64
          - os: windows-2022
            label: win32-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - name: Install pinned pnpm (Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          npm install --global "pnpm@${PNPM_VERSION}"
          test "$(pnpm --version)" = "${PNPM_VERSION}"
      - name: Install pinned pnpm (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          npm install --global "pnpm@$env:PNPM_VERSION"
          if ((pnpm --version).Trim() -ne $env:PNPM_VERSION) { throw "Unexpected pnpm version: $(pnpm --version)" }
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Install Linux native sandbox dependency
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes bubblewrap
          if sysctl -n kernel.apparmor_restrict_unprivileged_userns >/dev/null 2>&1; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi
          if sysctl -n kernel.unprivileged_userns_clone >/dev/null 2>&1; then
            sudo sysctl -w kernel.unprivileged_userns_clone=1
          fi
          bwrap --die-with-parent --new-session --unshare-all --ro-bind / / --proc /proc --dev /dev -- /bin/true
      - name: Build protocol and product packages
        run: pnpm build
      - name: Run deterministic evaluation, fairness, metrics, and native conformance
        run: pnpm eval:conformance

  build-test:
    name: Ubuntu product and portable release checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install pinned pnpm
        run: |
          npm install --global "pnpm@${PNPM_VERSION}"
          test "$(pnpm --version)" = "${PNPM_VERSION}"
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install "${RUST_VERSION}" --profile minimal --component rustfmt --component clippy
          rustup default "${RUST_VERSION}"
          rustup toolchain install "${RUST_COVERAGE_TOOLCHAIN}" --profile minimal --component llvm-tools-preview
          cargo install cargo-llvm-cov --version "${CARGO_LLVM_COV_VERSION}" --locked
      - name: Install Linux sandbox test dependency
        run: |
          sudo apt-get update
          sudo apt-get install --yes bubblewrap
          if sysctl -n kernel.apparmor_restrict_unprivileged_userns >/dev/null 2>&1; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi
          if sysctl -n kernel.unprivileged_userns_clone >/dev/null 2>&1; then
            sudo sysctl -w kernel.unprivileged_userns_clone=1
          fi
          bwrap --die-with-parent --new-session --unshare-all --ro-bind / / --proc /proc --dev /dev -- /bin/true
      - name: Verify pinned toolchain
        run: |
          test "$(node --version)" = "v${NODE_VERSION}"
          test "$(pnpm --version)" = "${PNPM_VERSION}"
          test "$(rustc --version | awk '{print $2}')" = "${RUST_VERSION}"
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Native broker tests and lint
        run: |
          cargo fmt --manifest-path native/sigma-exec/Cargo.toml -- --check
          cargo test --locked --manifest-path native/sigma-exec/Cargo.toml
          cargo clippy --locked --manifest-path native/sigma-exec/Cargo.toml --all-targets -- -D warnings
          cargo build --locked --manifest-path native/sigma-exec/Cargo.toml
          mkdir -p .artifacts
          pnpm test:coverage:native-protocol
      - name: Real Linux hardening self-test
        run: >-
          python3 scripts/ci/linux-hardening-self-test.py
          --broker native/sigma-exec/target/debug/sigma-exec
      - name: Build
        run: pnpm build
      - name: Lint
        run: pnpm lint
      - name: Test with coverage
        run: pnpm test:coverage
      - name: Harbor tests
        run: pnpm test:harbor
      - name: Local fake smoke
        run: pnpm smoke:local:fake
      - name: TUI product smoke
        run: pnpm smoke:tui-product
      - name: Sandbox boundary
        run: pnpm verify:containment
      - name: Verify portable Linux agent CLI
        env:
          AGENT_REQUIRE_TARGET_WRAPPER: "1"
        run: pnpm verify:package:agent-cli:linux
      - name: Portable Linux glibc compatibility matrix
        run: pnpm verify:package:agent-cli:linux:matrix
      - name: Required Linux namespace, Landlock, seccomp, and PTY security test
        run: >-
          python3 scripts/ci/linux-sandbox-smoke.py
          --broker .artifacts/agent-cli-linux-x64/bin/sigma-exec
          --output .artifacts/sandbox-smoke-linux-x64.json
      - name: Required bundled TypeScript, Pyright, and MCP sandbox smoke
        run: >-
          node scripts/ci/lsp-sandbox-smoke.mjs
          --bundle .artifacts/agent-cli-linux-x64
          --broker .artifacts/agent-cli-linux-x64/bin/sigma-exec
          --target-platform linux
          --output .artifacts/lsp-sandbox-smoke-linux-x64.json
      - name: Real PTY /quit smoke on packaged CLI
        run: >-
          python3 scripts/ci/tui-real-terminal-smoke.py
          --node .artifacts/agent-cli-linux-x64/bin/node
          --cli .artifacts/agent-cli-linux-x64/packages/agent-cli/dist/index.js
      - name: 100k-file repository performance
        run: node scripts/perf-repository-100k.mjs
      - name: 100k-event V4 replay and snapshot gate
        run: pnpm perf:replay-v4-100k
      - name: Package Harbor runtime
        run: pnpm package:harbor-runtime
      - name: Product readiness
        run: pnpm product:readiness -- --target-platform linux --target-arch x64
      - name: Upload Linux x64 release evidence
        uses: actions/upload-artifact@v4
        with:
          name: sigma-code-linux-x64
          if-no-files-found: error
          include-hidden-files: true
          path: |
            .artifacts/agent-cli-linux-x64.tgz
            .artifacts/agent-cli-linux-x64.tgz.sha256
            .artifacts/agent-cli-linux-x64.sbom.cdx.json
            .artifacts/agent-cli-linux-x64.provenance.json
            .artifacts/agent-cli-package-verify-linux-x64.json
            .artifacts/linux-package-compatibility-matrix.json
            .artifacts/sandbox-smoke-linux-x64.json
            .artifacts/lsp-sandbox-smoke-linux-x64.json
            .artifacts/sigma-exec-branch-coverage.json
            .artifacts/replay-v4-100k.json
            .artifacts/product-readiness-linux-x64.*

  windows-release:
    name: Windows product, ConPTY, and portable release checks
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - name: Configure canonical runner temp directory
        run: |
          "TEMP=$env:RUNNER_TEMP" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "TMP=$env:RUNNER_TEMP" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install pinned pnpm
        run: |
          npm install --global "pnpm@$env:PNPM_VERSION"
          if ((pnpm --version).Trim() -ne $env:PNPM_VERSION) { throw "Unexpected pnpm version: $(pnpm --version)" }
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install $env:RUST_VERSION --profile minimal --component rustfmt --component clippy
          rustup default $env:RUST_VERSION
          rustup toolchain install $env:RUST_COVERAGE_TOOLCHAIN --profile minimal --component llvm-tools-preview
          cargo install cargo-llvm-cov --version $env:CARGO_LLVM_COV_VERSION --locked
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify pinned toolchain
        run: |
          if ((node --version).Trim() -ne "v$env:NODE_VERSION") { throw "Unexpected Node version: $(node --version)" }
          if ((pnpm --version).Trim() -ne $env:PNPM_VERSION) { throw "Unexpected pnpm version: $(pnpm --version)" }
          $rustVersion = ((rustc --version) -split ' ')[1]
          if ($rustVersion -ne $env:RUST_VERSION) { throw "Unexpected Rust version: $rustVersion" }
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Native broker tests and lint
        run: |
          cargo fmt --manifest-path native/sigma-exec/Cargo.toml -- --check
          cargo test --locked --manifest-path native/sigma-exec/Cargo.toml
          cargo clippy --locked --manifest-path native/sigma-exec/Cargo.toml --all-targets -- -D warnings
          cargo build --locked --manifest-path native/sigma-exec/Cargo.toml
          New-Item -ItemType Directory -Path .artifacts -Force | Out-Null
          pnpm test:coverage:native-protocol
      - name: Install pinned ConPTY smoke dependency
        run: >-
          python -m pip install --disable-pip-version-check --only-binary=:all:
          --require-hashes -r scripts/ci/windows-pty-requirements.txt
      - name: Build
        run: pnpm build
      - name: Lint
        run: pnpm lint
      - name: Test with coverage
        run: pnpm test:coverage -- --maxWorkers=2 --testTimeout=20000
      - name: Harbor tests
        run: pnpm test:harbor
      - name: Local fake smoke
        run: pnpm smoke:local:fake
      - name: TUI product smoke
        run: pnpm smoke:tui-product
      - name: Sandbox boundary
        run: pnpm verify:containment
      - name: Prepare Windows package Node runtime
        id: windows-node
        run: |
          $runtimeRoot = Join-Path $env:RUNNER_TEMP "sigma-node-runtime"
          $runtimeDir = Join-Path $runtimeRoot "node-v$env:NODE_VERSION-win-x64"
          $archive = Join-Path $env:RUNNER_TEMP "node-v$env:NODE_VERSION-win-x64.zip"
          Remove-Item -LiteralPath $runtimeRoot -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath $archive -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $runtimeDir -Force | Out-Null
          Copy-Item -LiteralPath (Get-Command node).Source -Destination (Join-Path $runtimeDir "node.exe")
          if ((& (Join-Path $runtimeDir "node.exe") --version).Trim() -ne "v$env:NODE_VERSION") {
            throw "Prepared Windows runtime does not match v$env:NODE_VERSION"
          }
          Compress-Archive -LiteralPath $runtimeDir -DestinationPath $archive -CompressionLevel Optimal
          $archiveSha256 = (Get-FileHash -LiteralPath $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          "NODE_RUNTIME_SHA256=$archiveSha256" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "archive=$archive" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      - name: Verify portable Windows agent CLI and wrapper
        env:
          NODE_RUNTIME_ARCHIVE: ${{ steps.windows-node.outputs.archive }}
        run: pnpm verify:package:agent-cli:windows
      - name: Required AppContainer and ConPTY security self-test
        run: |
          $report = & .\.artifacts\agent-cli-win32-x64\bin\agent.cmd sandbox setup --json | ConvertFrom-Json
          if (-not $report.ready) { throw "Required Windows sandbox is not ready: $($report.reason)" }
          if ($report.backend -notmatch "appcontainer" -or $report.backend -notmatch "conpty") {
            throw "Unexpected Windows sandbox backend: $($report.backend)"
          }
          python scripts/ci/windows-sandbox-smoke.py --broker .artifacts/agent-cli-win32-x64/bin/sigma-exec.exe --node .artifacts/agent-cli-win32-x64/bin/node.exe --output .artifacts/sandbox-smoke-win32-x64.json
      - name: Required bundled TypeScript, Pyright, and MCP sandbox smoke
        run: >-
          node scripts/ci/lsp-sandbox-smoke.mjs
          --bundle .artifacts/agent-cli-win32-x64
          --broker .artifacts/agent-cli-win32-x64/bin/sigma-exec.exe
          --target-platform win32
          --output .artifacts/lsp-sandbox-smoke-win32-x64.json
      - name: Real ConPTY /quit smoke on packaged CLI
        run: >-
          python scripts/ci/tui-real-terminal-smoke.py
          --node .artifacts/agent-cli-win32-x64/bin/node.exe
          --cli .artifacts/agent-cli-win32-x64/packages/agent-cli/dist/index.js
      - name: 100k-event V4 replay and snapshot gate
        run: pnpm perf:replay-v4-100k
      - name: Product readiness
        run: pnpm product:readiness -- --target-platform win32 --target-arch x64
      - name: Upload Windows x64 preview evidence
        uses: actions/upload-artifact@v4
        with:
          name: sigma-code-win32-x64-preview
          if-no-files-found: error
          include-hidden-files: true
          path: |
            .artifacts/agent-cli-win32-x64.zip
            .artifacts/agent-cli-win32-x64.zip.sha256
            .artifacts/agent-cli-win32-x64.sbom.cdx.json
            .artifacts/agent-cli-win32-x64.provenance.json
            .artifacts/agent-cli-package-verify-win32-x64.json
            .artifacts/sandbox-smoke-win32-x64.json
            .artifacts/lsp-sandbox-smoke-win32-x64.json
            .artifacts/sigma-exec-branch-coverage.json
            .artifacts/replay-v4-100k.json
            .artifacts/product-readiness-win32-x64.*
