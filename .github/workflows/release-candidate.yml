name: Release verification and publication

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  NODE_VERSION: 26.4.0
  PNPM_VERSION: 11.7.0
  RUST_VERSION: 1.96.0
  RUST_COVERAGE_TOOLCHAIN: nightly-2026-07-01
  CARGO_LLVM_COV_VERSION: 0.8.6

jobs:
  metadata:
    name: Validate release identity
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.release.outputs.version }}
      prerelease: ${{ steps.release.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require main or an exact version tag
        id: release
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { appendFileSync, readFileSync } from "node:fs";

          const { version } = JSON.parse(readFileSync("package.json", "utf8"));
          const semver = /^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?(?:\+[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?$/u;
          if (!semver.test(version)) throw new Error(`package.json contains invalid SemVer: ${version}`);
          const expectedTag = `v${version}`;
          if (process.env.GITHUB_EVENT_NAME === "push" && process.env.GITHUB_REF_NAME !== expectedTag) {
            throw new Error(`Release tag ${process.env.GITHUB_REF_NAME} must exactly equal ${expectedTag}.`);
          }
          if (process.env.GITHUB_EVENT_NAME === "workflow_dispatch" && process.env.GITHUB_REF !== "refs/heads/main") {
            throw new Error("Manual release verification must run from main.");
          }
          appendFileSync(process.env.GITHUB_OUTPUT, `version=${version}\nprerelease=${version.includes("-")}\n`);
          NODE
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            git fetch origin main --no-tags
            git merge-base --is-ancestor "${GITHUB_SHA}" origin/main || {
              echo "Release tags must point to a commit reachable from main." >&2
              exit 1
            }
          fi

  verify:
    name: ${{ matrix.label }} release and quick five
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            label: linux-x64
            release: linux
          - os: windows-2022
            label: win32-x64
            release: windows
    runs-on: ${{ matrix.os }}
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pinned pnpm (Linux)
        shell: bash
        if: runner.os != 'Windows'
        run: npm install --global "pnpm@${PNPM_VERSION}" && test "$(pnpm --version)" = "${PNPM_VERSION}"
      - name: Install pinned pnpm (Windows)
        if: runner.os == 'Windows'
        run: |
          npm install --global "pnpm@$env:PNPM_VERSION"
          if ((pnpm --version).Trim() -ne $env:PNPM_VERSION) { throw "Unexpected pnpm version: $(pnpm --version)" }
      - name: Install pinned Rust and coverage toolchain
        shell: bash
        if: runner.os != 'Windows'
        run: |
          rustup toolchain install "${RUST_VERSION}" --profile minimal --component llvm-tools-preview
          rustup default "${RUST_VERSION}"
          rustup toolchain install "${RUST_COVERAGE_TOOLCHAIN}" --profile minimal --component llvm-tools-preview
          cargo install cargo-llvm-cov --version "${CARGO_LLVM_COV_VERSION}" --locked
      - name: Install pinned Rust and coverage toolchain
        if: runner.os == 'Windows'
        run: |
          rustup toolchain install $env:RUST_VERSION --profile minimal --component llvm-tools-preview
          rustup default $env:RUST_VERSION
          rustup toolchain install $env:RUST_COVERAGE_TOOLCHAIN --profile minimal --component llvm-tools-preview
          cargo install cargo-llvm-cov --version $env:CARGO_LLVM_COV_VERSION --locked
      - name: Prepare Linux sandbox
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes bubblewrap
          if sysctl -n kernel.apparmor_restrict_unprivileged_userns >/dev/null 2>&1; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi
          if sysctl -n kernel.unprivileged_userns_clone >/dev/null 2>&1; then
            sudo sysctl -w kernel.unprivileged_userns_clone=1
          fi
      - name: Install Windows ConPTY dependency
        if: runner.os == 'Windows'
        run: "python -m pip install --disable-pip-version-check --only-binary=:all: --require-hashes -r scripts/ci/windows-pty-requirements.txt"
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Configure release provenance trust (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          RELEASE_PROVENANCE_PRIVATE_KEY_PEM: ${{ secrets.AGENT_RELEASE_SIGNING_PRIVATE_KEY_PEM }}
          RELEASE_PROVENANCE_PUBLIC_KEY_PEM: ${{ secrets.AGENT_RELEASE_TRUSTED_PUBLIC_KEY_PEM }}
        run: |
          if [[ -z "${RELEASE_PROVENANCE_PRIVATE_KEY_PEM}" || -z "${RELEASE_PROVENANCE_PUBLIC_KEY_PEM}" ]]; then
            echo "AGENT_RELEASE_SIGNING_PRIVATE_KEY_PEM and AGENT_RELEASE_TRUSTED_PUBLIC_KEY_PEM secrets are required." >&2
            exit 1
          fi
          umask 077
          private_key="${RUNNER_TEMP}/release-provenance-private.pem"
          public_key="${RUNNER_TEMP}/release-provenance-public.pem"
          printf '%s' "${RELEASE_PROVENANCE_PRIVATE_KEY_PEM}" > "${private_key}"
          printf '%s' "${RELEASE_PROVENANCE_PUBLIC_KEY_PEM}" > "${public_key}"
          echo "AGENT_RELEASE_SIGNING_PRIVATE_KEY_FILE=${private_key}" >> "${GITHUB_ENV}"
          echo "AGENT_RELEASE_TRUSTED_PUBLIC_KEY_FILES=${public_key}" >> "${GITHUB_ENV}"
      - name: Configure release provenance trust (Windows)
        if: runner.os == 'Windows'
        env:
          RELEASE_PROVENANCE_PRIVATE_KEY_PEM: ${{ secrets.AGENT_RELEASE_SIGNING_PRIVATE_KEY_PEM }}
          RELEASE_PROVENANCE_PUBLIC_KEY_PEM: ${{ secrets.AGENT_RELEASE_TRUSTED_PUBLIC_KEY_PEM }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:RELEASE_PROVENANCE_PRIVATE_KEY_PEM) -or
              [string]::IsNullOrWhiteSpace($env:RELEASE_PROVENANCE_PUBLIC_KEY_PEM)) {
            throw "AGENT_RELEASE_SIGNING_PRIVATE_KEY_PEM and AGENT_RELEASE_TRUSTED_PUBLIC_KEY_PEM secrets are required."
          }
          $privateKey = Join-Path $env:RUNNER_TEMP "release-provenance-private.pem"
          $publicKey = Join-Path $env:RUNNER_TEMP "release-provenance-public.pem"
          $utf8 = [System.Text.UTF8Encoding]::new($false)
          [System.IO.File]::WriteAllText($privateKey, $env:RELEASE_PROVENANCE_PRIVATE_KEY_PEM, $utf8)
          [System.IO.File]::WriteAllText($publicKey, $env:RELEASE_PROVENANCE_PUBLIC_KEY_PEM, $utf8)
          "AGENT_RELEASE_SIGNING_PRIVATE_KEY_FILE=$privateKey" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "AGENT_RELEASE_TRUSTED_PUBLIC_KEY_FILES=$publicKey" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Configure Authenticode signing identity
        if: runner.os == 'Windows'
        env:
          WINDOWS_SIGN_CERTIFICATE_PFX_BASE64: ${{ secrets.AGENT_WINDOWS_SIGN_CERTIFICATE_PFX_BASE64 }}
          WINDOWS_SIGN_CERTIFICATE_PASSWORD: ${{ secrets.AGENT_WINDOWS_SIGN_CERTIFICATE_PASSWORD }}
          WINDOWS_SIGN_TIMESTAMP_URL: ${{ vars.AGENT_WINDOWS_SIGN_TIMESTAMP_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGN_CERTIFICATE_PFX_BASE64) -or
              [string]::IsNullOrWhiteSpace($env:WINDOWS_SIGN_CERTIFICATE_PASSWORD)) {
            throw "AGENT_WINDOWS_SIGN_CERTIFICATE_PFX_BASE64 and AGENT_WINDOWS_SIGN_CERTIFICATE_PASSWORD secrets are required."
          }
          $signTool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" -File |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if ($null -eq $signTool) { throw "A Windows SDK signtool.exe installation is required." }
          $pfx = Join-Path $env:RUNNER_TEMP "release-signing.pfx"
          try {
            [System.IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_SIGN_CERTIFICATE_PFX_BASE64))
            $password = ConvertTo-SecureString $env:WINDOWS_SIGN_CERTIFICATE_PASSWORD -AsPlainText -Force
            $certificate = @(Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $password) |
              Where-Object HasPrivateKey |
              Select-Object -First 1
            if ($null -eq $certificate) { throw "The configured Windows signing PFX does not contain a private key." }
          } finally {
            Remove-Item -LiteralPath $pfx -Force -ErrorAction SilentlyContinue
          }
          $certificateSha256 = [Convert]::ToHexString(
            $certificate.GetCertHash([System.Security.Cryptography.HashAlgorithmName]::SHA256)
          ).ToLowerInvariant()
          "AGENT_WINDOWS_SIGNTOOL_PATH=$($signTool.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "AGENT_WINDOWS_SIGN_CERTIFICATE_SHA1=$($certificate.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "AGENT_WINDOWS_ALLOWED_SIGNER_CERT_SHA256=$certificateSha256" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          if (-not [string]::IsNullOrWhiteSpace($env:WINDOWS_SIGN_TIMESTAMP_URL)) {
            "AGENT_WINDOWS_SIGN_TIMESTAMP_URL=$($env:WINDOWS_SIGN_TIMESTAMP_URL)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
      - name: Verify release target
        run: pnpm verify:release:${{ matrix.release }}
      - name: Stage public provenance key
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p .artifacts
          cp -- "${AGENT_RELEASE_TRUSTED_PUBLIC_KEY_FILES}" .artifacts/release-provenance-public.pem
          chmod 0644 .artifacts/release-provenance-public.pem
      - name: Remove release signing material (Linux)
        if: always() && runner.os == 'Linux'
        shell: bash
        run: |
          for file in "${AGENT_RELEASE_SIGNING_PRIVATE_KEY_FILE:-}" "${AGENT_RELEASE_TRUSTED_PUBLIC_KEY_FILES:-}"; do
            if [[ -n "${file}" ]]; then rm -f -- "${file}"; fi
          done
      - name: Remove release signing material (Windows)
        if: always() && runner.os == 'Windows'
        run: |
          if (-not [string]::IsNullOrWhiteSpace($env:AGENT_RELEASE_SIGNING_PRIVATE_KEY_FILE)) {
            Remove-Item -LiteralPath $env:AGENT_RELEASE_SIGNING_PRIVATE_KEY_FILE -Force -ErrorAction SilentlyContinue
          }
          if (-not [string]::IsNullOrWhiteSpace($env:AGENT_RELEASE_TRUSTED_PUBLIC_KEY_FILES)) {
            Remove-Item -LiteralPath $env:AGENT_RELEASE_TRUSTED_PUBLIC_KEY_FILES -Force -ErrorAction SilentlyContinue
          }
          if (-not [string]::IsNullOrWhiteSpace($env:AGENT_WINDOWS_SIGN_CERTIFICATE_SHA1)) {
            Get-ChildItem Cert:\CurrentUser\My |
              Where-Object Thumbprint -eq $env:AGENT_WINDOWS_SIGN_CERTIFICATE_SHA1 |
              Remove-Item -Force
          }
      - name: Require all five live scenarios and zero safety failures
        run: pnpm eval:agent -- --suite quick --repeat 1 --skip-package --eval-root .artifacts/eval-rc
      - name: Upload verified release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}-${{ github.run_id }}
          if-no-files-found: error
          path: |
            .artifacts/agent-cli-${{ matrix.label }}.${{ matrix.release == 'windows' && 'zip' || 'tgz' }}
            .artifacts/agent-cli-${{ matrix.label }}.sha256
            .artifacts/agent-cli-${{ matrix.label }}.sbom.cdx.json
            .artifacts/agent-cli-${{ matrix.label }}.provenance.json
      - name: Upload public provenance key
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: release-public-key-${{ github.run_id }}
          if-no-files-found: error
          path: .artifacts/release-provenance-public.pem
      - name: Upload candidate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rc-${{ matrix.label }}-${{ github.run_id }}
          if-no-files-found: warn
          include-hidden-files: true
          path: .artifacts/**

  publish:
    name: Publish GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: [metadata, verify]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download verified release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*-${{ github.run_id }}
          path: release-assets
          merge-multiple: true
      - name: Require the complete release asset set
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { readdirSync } from "node:fs";

          const expected = [
            "agent-cli-linux-x64.tgz",
            "agent-cli-linux-x64.sha256",
            "agent-cli-linux-x64.sbom.cdx.json",
            "agent-cli-linux-x64.provenance.json",
            "agent-cli-win32-x64.zip",
            "agent-cli-win32-x64.sha256",
            "agent-cli-win32-x64.sbom.cdx.json",
            "agent-cli-win32-x64.provenance.json",
            "release-provenance-public.pem"
          ];
          const actual = new Set(readdirSync("release-assets"));
          const missing = expected.filter((name) => !actual.has(name));
          if (missing.length > 0) throw new Error(`Missing release assets: ${missing.join(", ")}`);
          NODE
      - name: Create immutable GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ needs.metadata.outputs.version }}
          RELEASE_PRERELEASE: ${{ needs.metadata.outputs.prerelease }}
        run: |
          options=(--verify-tag --generate-notes --title "Sigma Code ${GITHUB_REF_NAME}")
          if [[ "${RELEASE_PRERELEASE}" == "true" ]]; then
            options+=(--prerelease)
          else
            options+=(--latest)
          fi
          gh release create "${GITHUB_REF_NAME}" release-assets/* "${options[@]}"
