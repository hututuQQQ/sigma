name: Bug report
description: Report a reproducible Sigma Code problem
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Please use private vulnerability reporting for security issues.
  - type: input
    id: version
    attributes:
      label: Sigma Code version
      placeholder: 3.0.0-rc.1
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows x64
        - Linux x64 technical preview
        - Source checkout
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include expected behavior and a minimal reproduction.
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Paste relevant redacted `agent doctor` output and logs. Never include API keys.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Safety checks
      options:
        - label: I removed credentials and private repository data from this report.
          required: true
        - label: This is not a security vulnerability.
          required: true
